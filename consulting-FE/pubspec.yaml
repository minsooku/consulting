name: consulting_fe
description: "EppleyWorkoutConsulting"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_native:
    path: lib/components/customs/cupertino_native-0.1.1
  flutter_snake_navigationbar: ^0.6.1
  intl: ^0.20.2
  flutter_bouncing_widgets: ^1.0.3
  smooth_sheets: ^0.17.0
  cupertino_calendar_picker: ^2.2.6
  flutter_svg: ^2.1.0
  url_launcher: ^6.3.2
  supabase_flutter: ^2.9.0
  google_sign_in: ^7.2.0
  http: ^1.6.0
  animate_do: ^4.2.0
  flutter_secure_storage: ^10.0.0
  provider: ^6.1.5+1
  shimmer: ^3.0.0
  flutter_native_splash: ^2.4.7
  sensors_plus: ^6.1.1
  mobile_scanner: ^7.2.0
  image_picker: ^1.1.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  audioplayers: ^6.6.0
  flutter_ringtone_player: ^4.0.0+4
  audio_session: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

# ── App Icon (iOS only) ──────────────────────────────────────────────────────
flutter_launcher_icons:
  ios: true
  android: false
  remove_alpha_ios: true
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21

# ── Splash Screen (iOS only) ─────────────────────────────────────────────────
flutter_native_splash:
  color: "#ffffff"
  image: assets/icons/logo.png
  ios: true
  android: false
  ios_content_mode: center
  fullscreen: false

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/machine/HammerStrength/
    - assets/machine/LifeFitness/
    - assets/machine/Precor/

  fonts:
    - family: NanumSquareRound
      fonts:
        - asset: assets/fonts/NanumSquareRoundL.ttf
          weight: 300
        - asset: assets/fonts/NanumSquareRoundR.ttf
          weight: 400
        - asset: assets/fonts/NanumSquareRoundB.ttf
          weight: 700
        - asset: assets/fonts/NanumSquareRoundEB.ttf
          weight: 800
